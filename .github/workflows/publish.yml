name: Publish to PyPI

# Triggers when you create a GitHub Release (e.g. tag v0.1.0)
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcpsafe/

    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing (OIDC) — no API token needed.
        # Set up at: https://pypi.org/manage/account/publishing/
        # Project: mcpsafe  |  Owner: Ravikiranbantwal  |  Workflow: publish.yml

  publish-testpypi:
    name: Publish to TestPyPI (pre-release)
    # Only runs on pre-release tags like v0.1.0a1, v0.1.0b2, v0.1.0rc1
    if: github.event.release.prerelease == true
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/mcpsafe/

    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          # For TestPyPI use: https://test.pypi.org/legacy/
